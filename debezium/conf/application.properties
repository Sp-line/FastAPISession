debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.offset.storage.file.filename=data/offsets.dat
debezium.source.offset.flush.interval.ms=0


debezium.source.database.hostname=pg
debezium.source.database.port=5432
debezium.source.database.user=${POSTGRES_USER}
debezium.source.database.password=${POSTGRES_PASSWORD}
debezium.source.database.dbname=${POSTGRES_DB}

debezium.source.plugin.name=pgoutput
debezium.source.topic.prefix=${DEBEZIUM_TOPIC_PREFIX}

debezium.source.table.include.list=public.outbox_events


debezium.sink.type=nats-jetstream
debezium.sink.nats-jetstream.url=${NATS_INTERNAL_URL}
debezium.sink.nats-jetstream.create-stream=false
debezium.sink.nats-jetstream.subjects=${DEBEZIUM_TOPIC_PREFIX}.>


debezium.source.transforms=outbox
debezium.source.transforms.outbox.type=io.debezium.transforms.outbox.EventRouter

debezium.source.transforms.outbox.table.field.event.id=code
debezium.source.transforms.outbox.table.field.event.key=code
debezium.source.transforms.outbox.table.fields.additional.placement=code:header:Nats-Msg-Id
debezium.source.header.converter.schemas.enable=false
debezium.source.value.converter.schemas.enable=false
debezium.source.key.converter.schemas.enable=false
debezium.source.transforms.outbox.table.expand.json.payload=true
debezium.source.transforms.outbox.table.field.event.payload=payload

debezium.source.transforms.outbox.route.by.field=subject
debezium.source.transforms.outbox.route.topic.replacement=$${routedByValue}

debezium.source.tombstones.on.delete=false
